name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11"]

    steps:
      - name: Pobierz repozytorium
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Ustaw Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Udostępnij FFmpeg w środowisku testowym Linux
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends ffmpeg

      - name: Udostępnij FFmpeg w środowisku testowym macOS
        if: runner.os == 'macOS'
        env:
          HOMEBREW_NO_AUTO_UPDATE: "1"
        run: brew install ffmpeg

      - name: Udostępnij FFmpeg w środowisku testowym Windows
        if: runner.os == 'Windows'
        run: choco install ffmpeg --yes --no-progress

      - name: Sprawdź środowisko multimedialne
        run: python skills/create-property-walkthrough/scripts/preflight_environment.py --mode full_production --json

      - name: Uruchom testy
        run: python -m unittest discover -s tests -v

  python-compatibility:
    name: Python ${{ matrix.python-version }} / zgodność wersji
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.13"]

    steps:
      - name: Pobierz repozytorium
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Ustaw Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Udostępnij FFmpeg w środowisku testowym Linux
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends ffmpeg

      - name: Sprawdź środowisko multimedialne
        run: python skills/create-property-walkthrough/scripts/preflight_environment.py --mode full_production --json

      - name: Uruchom testy
        run: python -m unittest discover -s tests -v

  distribution:
    name: Kontrakt dystrybucji
    runs-on: ubuntu-22.04
    timeout-minutes: 10

    steps:
      - name: Pobierz repozytorium
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Ustaw Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"

      - name: Waliduj manifesty JSON
        run: |
          python -m json.tool .codex-plugin/plugin.json
          python -m json.tool .agents/plugins/marketplace.json

      - name: Sprawdź kontrakt dystrybucji
        run: python -m unittest tests.test_distribution tests.test_skill_structure -v
